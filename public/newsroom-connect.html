<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=11">
  <title>Viz Newsroom Connect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #toolbar { padding: 8px 12px; background: #1f2937; border-bottom: 1px solid #374151; display: flex; align-items: center; gap: 8px; }
    #status { color: #9ca3af; font-size: 12px; flex: 1; }
    #mosactivex { flex: 1; width: 100%; display: block; }
    .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #374151; color: #d1d5db; }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="status">
      1. Select a template → 2. Fill fields → 3. Click 💾 Save → 4. Click Attach CG
    </span>
    <button class="btn btn-secondary" onclick="window.close()">Cancel</button>
    <button class="btn btn-primary" onclick="attachSelected()">Attach CG</button>
  </div>

  <object
    id="mosactivex"
    classid="CLSID:5B48BF7C-9CF4-48FF-8634-1B7495585267"
    width="100%"
    height="100%">
    <param name="PDSServer" value="192.168.1.52" />
    <param name="PDSPort" value="8177" />
    <p style="color:#ef4444;padding:20px;">
      Viz Newsroom Connect plugin not found.
      Ensure Viz Pilot 8.6 is installed and this page is opened in IE Mode.
    </p>
  </object>

  <script>
    var params = new URLSearchParams(window.location.search);
    var storyId = params.get('storyId');
    var rundownItemId = params.get('rundownItemId');
    
    // Determine NRCS origin (fallback to window.location.origin if available)
    var nrcsOrigin = params.get('origin');
    if (!nrcsOrigin || nrcsOrigin === 'null') {
      nrcsOrigin = window.location.origin && window.location.origin !== 'null' 
        ? window.location.origin 
        : '';
    }
    
    var viz = document.getElementById('vizObject') || 
              document.getElementById('mosactivex') ||
              document.querySelector('object');

    function attachSelected() {
      try {
        var elementId = null;
        var elementName = null;
        var savedName = null;
        var concept = null;
        var template = null;

        // Get element ID
        try { elementId = viz.GetSelectedElementId(); } catch(e) {}
        try { if (!elementId) elementId = viz.SelectedElement.Id; } catch(e) {}

        if (!elementId) {
          document.getElementById('status').textContent = 
            '⚠ Please hit the Save icon (💾), then click Attach CG again.';
          return;
        }

        // Get the SAVED element name (Data element name column in Viz panel)
        // This is what was entered when saving — e.g. "test4", "test11"
        try { savedName = viz.GetSelectedElementName(); } catch(e) {}
        try { if (!savedName) savedName = viz.SelectedElement.Name; } catch(e) {}
        try { if (!savedName) savedName = viz.GetElementName(elementId); } catch(e) {}
        try { if (!savedName) savedName = viz.GetCurrentDataElement(); } catch(e) {}

        // Get template name
        try { template = viz.GetSelectedTemplateName(); } catch(e) {}
        try { if (!template) template = viz.SelectedTemplate; } catch(e) {}

        // Get concept
        try { concept = viz.GetSelectedConceptName(); } catch(e) {}
        try { if (!concept) concept = viz.SelectedConcept; } catch(e) {}

        // elementName = saved name if available, otherwise template name
        elementName = savedName || template || elementId;

        document.getElementById('status').textContent = 
          '✓ Attaching: ' + elementName + ' (ID: ' + elementId + ')';

        var payload = {
          type: 'VIZ_CG_SELECTED',
          storyId: storyId,
          rundownItemId: rundownItemId,
          element: {
            id: elementId,
            name: elementName,
            savedName: savedName,
            concept: concept,
            template: template
          }
        };

        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, '*');
        }

        var xhr = new XMLHttpRequest();
        // Use NRCS origin passed from the application
        xhr.open('POST', nrcsOrigin + '/api/cg/viz-callback', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onload = function() {
          if (xhr.status >= 200 && xhr.status < 300) {
            document.getElementById('status').textContent = '✓ Done! Closing...';
            setTimeout(function() { window.close(); }, 800);
          } else {
            document.getElementById('status').textContent = 'Error: ' + xhr.responseText;
          }
        };
        xhr.onerror = function() { 
          document.getElementById('status').textContent = 'Network Error';
          setTimeout(function() { window.close(); }, 2000);
        };
        xhr.send(JSON.stringify(payload));

      } catch(err) {
        document.getElementById('status').textContent = 'Error: ' + err.message;
      }
    }

    // Drag and drop XML interceptor
    var toolbar = document.getElementById('toolbar');
    function highlight(e) { e.preventDefault(); e.stopPropagation(); }
    toolbar.addEventListener('dragover', highlight);
    toolbar.addEventListener('dragenter', highlight);
    toolbar.addEventListener('drop', function(e) {
      e.preventDefault();
      var mosText = '';
      try { mosText = e.dataTransfer.getData('Text') || e.dataTransfer.getData('text/plain'); } catch(err) {}
      if (!mosText || mosText.indexOf('<mos>') === -1) return;

      var extract = function(tag) {
        var match = mosText.match(new RegExp('<' + tag + '>(.*?)<\/' + tag + '>', 'i'));
        return match ? match[1] : '';
      };

      var elementId = extract('objID');
      var elementName = extract('objSlug');
      var concept = extract('concept');
      var template = extract('template');

      finishAttachMOS_Direct(elementId, elementName, concept, template);
    });

    function finishAttachMOS_Direct(elementId, elementName, concept, template) {
      // Re-use logic if needed, but the primary method is now attachSelected
      var payload = {
        type: 'VIZ_CG_SELECTED',
        storyId: storyId,
        rundownItemId: rundownItemId,
        element: {
          id: elementId,
          name: elementName,
          savedName: elementName,
          concept: concept,
          template: template
        }
      };
      
      var xhr = new XMLHttpRequest();
      xhr.open('POST', nrcsOrigin + '/api/cg/viz-callback', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onload = function() { window.close(); };
      xhr.send(JSON.stringify(payload));
    }
  </script>
</body>
</html>
